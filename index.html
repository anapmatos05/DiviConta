<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiviConta - O Divisor de Contas Rápido</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS Personalizado -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-orange-50 via-white to-red-50 min-h-screen">

    <!-- Container Principal -->
    <div class="container mx-auto px-4 py-8 max-w-6xl">

        <!-- Cabeçalho -->
        <header class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-extrabold text-gray-800 mb-3">
                🍕 DiviConta - O Divisor de Contas Rápido
            </h1>
            <p class="text-gray-500 text-lg">
                Adiciona despesas e divide as contas entre amigos.
            </p>
        </header>

        <!-- Secção Principal -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

            <!-- Formulário -->
            <div class="card">
                <h2 class="section-title">Adicionar Novo Gasto</h2>

                <form class="space-y-5">
                    <div>
                        <label class="label">
                            Nome do Amigo
                        </label>
                        <input
                            type="text"
                            placeholder="Ex: João"
                            class="input-field"
                        >
                    </div>

                    <div>
                        <label class="label">
                            Valor do Gasto (€)
                        </label>
                        <input
                            type="number"
                            placeholder="0.00"
                            step="0.01"
                            class="input-field"
                        >
                    </div>

                    <button
                        type="button"
                        class="btn-primary"
                    >
                        ➕ Adicionar Gasto
                    </button>
                </form>
            </div>

            <!-- Lista de Gastos -->
            <div class="card">
                <h2 class="section-title">Despesas Registadas</h2>

                <div class="overflow-hidden rounded-xl border border-gray-200">
                    <table class="w-full">
                        <thead>
                            <tr class="bg-gray-100">
                                <th class="table-head">Nome</th>
                                <th class="table-head">Gasto</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr class="table-row">
                                <td class="table-cell">Maria</td>
                                <td class="table-cell">20€</td>
                            </tr>

                            <tr class="table-row">
                                <td class="table-cell">João</td>
                                <td class="table-cell">10€</td>
                            </tr>

                            <tr class="table-row">
                                <td class="table-cell">Pedro</td>
                                <td class="table-cell">15€</td>
                            </tr>

                            <tr class="table-row">
                                <td class="table-cell">Ana</td>
                                <td class="table-cell">25€</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>

        <!-- Botão Calcular -->
        <div class="mt-10 text-center">
            <button class="btn-calculate">
                🧮 Calcular Dívidas
            </button>
        </div>

        <!-- Resultados -->
        <section class="result-box mt-10">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">
                Resultado
            </h2>

            <p class="text-lg text-green-700 font-semibold">
                O João tem de pagar 5€ à Maria
            </p>
        </section>

    </div>

</body>
</html>
